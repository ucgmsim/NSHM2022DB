name: Pytest Check

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install GMT
        run: sudo apt-get update && sudo apt-get install -y gmt libgmt-dev ghostscript

      - name: Define a cache dependency glob
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "requirements**.txt"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Initialise DuckDB
        run: uv run --all-groups python -c "import duckdb; duckdb.sql('INSTALL sqlite')"

      - name: Run tests
        run: |
          uv run --all-groups pytest --cov=nshmdb --cov-report=html tests

      - name: Combine coverage and fail it it’s under 100 %
        run: |
          uv run --all-groups python -m coverage html --skip-covered --skip-empty

          # Report and write to summary.
          uv run --all-groups python -m coverage report | sed 's/^/    /' >> $GITHUB_STEP_SUMMARY

          # Report again and fail if under 95%.
          uv run --all-groups python -Im coverage report --fail-under=95

      - name: Upload HTML report if check failed
        uses: actions/upload-artifact@v4

        with:
          name: html-report
          path: htmlcov

        if: ${{ failure() }}
