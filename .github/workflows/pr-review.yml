name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write   # required for issue comments (PRs are also issues)

jobs:
  review:
    runs-on: self-hosted   # Uses your hypocentre runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test Ollama connection
        run: |
          curl -s http://localhost:11434/api/version || exit 1
          echo "Ollama is reachable"

      - name: Get PR diff
        id: diff
        run: |
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ github.event.pull_request.diff_url }}" > pr.diff


      - name: Run Ollama review
        id: review
        run: |
          sudo apt-get update && sudo apt-get install -y jq
      
          # Check if the diff is too large
          DIFF_SIZE=$(wc -c < pr.diff)
          if [ "$DIFF_SIZE" -gt 50000 ]; then
            echo "⚠️ Diff is too large ($DIFF_SIZE bytes). Only reviewing first 50000 bytes."
            head -c 50000 pr.diff > pr.diff.truncated
            mv pr.diff.truncated pr.diff
          fi
      
          cat > prompt.txt << 'EOF'
          You are a harsh code reviewer. Your ONLY job is to find SPECIFIC problems in the code changes shown below.
      
          RULES:
          1. IGNORE what the code does. DO NOT summarize or describe it.
          2. ONLY point out ACTUAL ISSUES: bugs, security flaws, performance problems, or bad practices.
          3. For EACH issue, specify:
             - The EXACT line(s) of code (copy the problematic code)
             - WHY it's a problem
             - HOW to fix it (with example code if possible)
          4. If you can't find any issues, output: "✅ No issues found."
          5. Be CRITICAL. Look for edge cases, missing error handling, security holes, and inefficiencies.
      
          FORMAT (MUST FOLLOW EXACTLY):
          ### FILE: filename.py
          - LINE: [exact code line]
          - PROBLEM: [what's wrong]
          - FIX: [how to fix]
      
          ### FILE: another.py
          - LINE: [exact code line]
          - PROBLEM: [what's wrong]
          - FIX: [how to fix]
      
          Code changes to review:
          EOF
      
          cat pr.diff >> prompt.txt
      
          jq -n --rawfile prompt prompt.txt '{
            model: "deepseek-coder-v2:16b",
            prompt: $prompt,
            stream: false,
            options: {
              temperature: 0.1,
              max_tokens: 4000
            }
          }' > payload.json
      
          curl -s -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d @payload.json > response.json
      
          jq -r '.response' response.json > review.txt
      
          rm -f prompt.txt payload.json response.json

      - name: Post line-specific comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            
            // Parse the review for line-specific comments
            // Format: ### FILE: filename.py
            //         - LINE: code line
            //         - PROBLEM: description
            //         - FIX: suggestion
            
            const blocks = review.split('### FILE:');
            const comments = [];
            
            for (const block of blocks) {
              if (!block.trim()) continue;
              
              const lines = block.split('\n');
              const fileMatch = lines[0].match(/^(.*?)(?:\n|$)/);
              if (!fileMatch) continue;
              
              const filePath = fileMatch[0].trim();
              const content = lines.slice(1).join('\n');
              
              // Extract LINE, PROBLEM, FIX
              const lineMatch = content.match(/- LINE:\s*(.+)/);
              const problemMatch = content.match(/- PROBLEM:\s*(.+)/);
              const fixMatch = content.match(/- FIX:\s*(.+)/);
              
              if (lineMatch && problemMatch && fixMatch) {
                comments.push({
                  path: filePath,
                  line: lineMatch[1].trim(),
                  problem: problemMatch[1].trim(),
                  fix: fixMatch[1].trim()
                });
              }
            }
            
            // If no structured comments found, use the raw review
            if (comments.length === 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🤖 AI Code Review\n\n${review}`
              });
              return;
            }
            
            // Post each as a line-specific comment
            for (const comment of comments) {
              try {
                // Try to find the line number in the file
                // This requires the file to be in the repo
                const { data: fileContent } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: comment.path,
                  ref: context.payload.pull_request.head.sha
                });
                
                const content = Buffer.from(fileContent.content, 'base64').toString('utf-8');
                const lines = content.split('\n');
                
                // Find the line number that contains the code snippet
                let lineNumber = -1;
                for (let i = 0; i < lines.length; i++) {
                  if (lines[i].includes(comment.line)) {
                    lineNumber = i + 1;
                    break;
                  }
                }
                
                if (lineNumber > 0) {
                  await github.rest.pulls.createReviewComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    body: `**Problem:** ${comment.problem}\n\n**Fix:** ${comment.fix}`,
                    path: comment.path,
                    line: lineNumber,
                    side: 'RIGHT'
                  });
                } else {
                  // Fallback: post as a regular comment
                  await github.rest.issues.createComment({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: `## 📁 ${comment.path}\n\n**Problem:** ${comment.problem}\n\n**Fix:** ${comment.fix}`
                  });
                }
              } catch (error) {
                console.log(`Failed to post comment for ${comment.path}: ${error.message}`);
                // Fallback: post as a regular comment
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `## 📁 ${comment.path}\n\n**Problem:** ${comment.problem}\n\n**Fix:** ${comment.fix}`
                });
              }
            }
            
            // Also post a summary
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 AI Code Review Summary\n\nFound **${comments.length}** issues. See inline comments for details.`
            });
      

