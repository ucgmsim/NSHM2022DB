name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ github.event.pull_request.diff_url }}" > pr.diff

      - name: Debug - Check diff content
        run: |
          echo "📏 Full diff size: $(wc -c < pr.diff) bytes"
          echo "📝 First 500 characters of diff:"
          head -c 500 pr.diff
          echo ""
          echo "📊 Files in diff:"
          grep '^diff --git' pr.diff || echo "No diff entries found"

      - name: Run DeepSeek review
        id: review
        run: |
          sudo apt-get update && sudo apt-get install -y jq

          # If diff is empty, exit early
          if [ ! -s pr.diff ]; then
            echo "✅ PR diff is empty. Nothing to review." > review.txt
            exit 0
          fi

          # Use the FULL diff - don't filter it
          # The AI should handle identifying code vs non-code files
          cat pr.diff > pr.diff.full

          cat > prompt.txt << 'EOF'
          You are a senior code reviewer. Review the following code diff.

          CRITICAL RULES:
          1. DO NOT summarize what the code does.
          2. ONLY point out SPECIFIC problems in the code changes.
          3. For each problem, provide:
             - The EXACT file name
             - The EXACT line number (if available from the diff) – look for the line number in the diff metadata (e.g., @@ -1,5 +1,6 @@) and use it.
             - The EXACT problematic code line (copy the code)
             - WHY it's a problem
             - HOW to fix it
          4. Focus on: bugs, security flaws, performance issues, bad practices.
          5. If you find no issues, output: "✅ No issues found. The code looks good."

          FORMAT (MUST FOLLOW EXACTLY):
          ### FILE: filename.py
          - LINE: 42
          - CODE: [the exact problematic line]
          - PROBLEM: [what's wrong]
          - FIX: [how to fix]

          ### FILE: another.py
          - CODE: [the exact problematic line]
          - PROBLEM: [what's wrong]
          - FIX: [how to fix]

          Code diff to review:
          EOF

          cat pr.diff.full >> prompt.txt

          # Create JSON payload for DeepSeek API
          cat > payload.json << JSONEOF
          {
            "model": "deepseek-chat",
            "messages": [
              {"role": "system", "content": "You are a harsh code reviewer. Only output issues in the exact format specified. If the diff is empty or only contains binary files, output exactly: '✅ No code changes to review.'"},
              {"role": "user", "content": $(jq -Rs . < prompt.txt)}
            ],
            "temperature": 0.1,
            "max_tokens": 4000
          }
          JSONEOF

          # Call DeepSeek API
          curl -s -X POST https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEEPSEEK_API_KEY }}" \
            -d @payload.json > response.json

          # Extract the response
          jq -r '.choices[0].message.content' response.json > review.txt

          # Clean up
          rm -f prompt.txt payload.json response.json pr.diff.full

      - name: Post inline comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            
            if (!review || review.trim() === '') {
              console.log('⚠️ Review is empty, skipping.');
              return;
            }
            
            // Helper to extract code snippets and issues
            function parseReview(text) {
              const issues = [];
              const blocks = text.split(/### FILE:/);
              for (const block of blocks) {
                if (!block.trim()) continue;
                const lines = block.split('\n');
                // First line is the file name
                const fileLine = lines[0].trim();
                if (!fileLine) continue;
                // Sometimes the filename might have extra chars, clean it
                const filePath = fileLine.replace(/^['"]?|['"]?$/g, '').trim();
                // Extract content
                const content = lines.slice(1).join('\n');
                // Find sections: - CODE: ..., - PROBLEM: ..., - FIX: ...
                const codeMatch = content.match(/- CODE:\s*(.+?)(?=\n- PROBLEM:|\n- FIX:|\n---|$)/is);
                const problemMatch = content.match(/- PROBLEM:\s*(.+?)(?=\n- CODE:|\n- FIX:|\n---|$)/is);
                const fixMatch = content.match(/- FIX:\s*(.+?)(?=\n- CODE:|\n- PROBLEM:|\n---|$)/is);
                if (codeMatch && problemMatch && fixMatch) {
                  issues.push({
                    path: filePath,
                    code: codeMatch[1].trim(),
                    problem: problemMatch[1].trim(),
                    fix: fixMatch[1].trim()
                  });
                }
              }
              return issues;
            }
            
            const issues = parseReview(review);
            console.log(`📊 Parsed ${issues.length} issues from review.`);
            
            if (issues.length === 0) {
              // Fallback: post as a single comment
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🤖 DeepSeek Code Review\n\n${review}`
              });
              return;
            }
            
            // For each issue, try to find the line number in the file
            for (const issue of issues) {
              console.log(`📁 Processing ${issue.path}`);
              let lineNumber = null;
              
              try {
                // Fetch the file content from the PR head commit
                const { data: fileContent } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: issue.path,
                  ref: context.payload.pull_request.head.sha
                });
                
                const content = Buffer.from(fileContent.content, 'base64').toString('utf-8');
                const lines = content.split('\n');
                
                // Search for the code snippet (allow some flexibility)
                const searchLine = issue.code.trim();
                // If the code is long, take first 50 chars for matching
                const searchKey = searchLine.substring(0, 80);
                
                for (let i = 0; i < lines.length; i++) {
                  if (lines[i].includes(searchKey)) {
                    lineNumber = i + 1; // 1-indexed for GitHub
                    break;
                  }
                }
                
                if (lineNumber) {
                  console.log(`✅ Found line ${lineNumber} for ${issue.path}`);
                  // Post inline comment
                  await github.rest.pulls.createReviewComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    body: `**⚠️ Problem:** ${issue.problem}\n\n**✅ Fix:** ${issue.fix}`,
                    path: issue.path,
                    line: lineNumber,
                    side: 'RIGHT'
                  });
                } else {
                  console.log(`⚠️ Could not locate line for ${issue.path}, posting as file comment.`);
                  // Fallback: post as a general comment referencing the file
                  await github.rest.issues.createComment({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: `## 📁 ${issue.path}\n\n**💻 Code:** \`${issue.code}\`\n\n**⚠️ Problem:** ${issue.problem}\n\n**✅ Fix:** ${issue.fix}`
                  });
                }
              } catch (error) {
                console.log(`❌ Failed to fetch ${issue.path}: ${error.message}`);
                // Fallback: post as a general comment
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `## 📁 ${issue.path}\n\n**💻 Code:** \`${issue.code}\`\n\n**⚠️ Problem:** ${issue.problem}\n\n**✅ Fix:** ${issue.fix}`
                });
              }
            }
            
            // Optionally also post a summary comment
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 DeepSeek Code Review Summary\n\nFound **${issues.length}** issues. See inline comments for details.`
            });
