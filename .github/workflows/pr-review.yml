name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write   # required for issue comments (PRs are also issues)

jobs:
  review:
    runs-on: self-hosted   # Uses your hypocentre runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test Ollama connection
        run: |
          curl -s http://localhost:11434/api/version || exit 1
          echo "Ollama is reachable"

      - name: Get PR diff
        id: diff
        run: |
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ github.event.pull_request.diff_url }}" > pr.diff

      - name: Run Ollama review
        id: review
        run: |
            # Install jq if not present (for safe JSON handling)
            sudo apt-get update && sudo apt-get install -y jq
        
            # Write the full prompt to a temporary file
            cat > prompt.txt << 'EOF'
            You are a code reviewer. Review the following code changes. Focus on:
            - Bugs and logic errors
            - Performance issues
            - Security vulnerabilities
            - Code style and best practices
            - Missing error handling
        
            Provide specific, actionable feedback for each issue.
        
            Code diff:
            EOF
        
            # Append the diff to the prompt file
            cat pr.diff >> prompt.txt
        
            # Build the JSON payload using jq, reading the prompt from the file
            jq -n --rawfile prompt prompt.txt '{
              model: "qwen2.5-coder:7b",
              prompt: $prompt,
              stream: false,
              options: {
                temperature: 0.3,
                max_tokens: 2000
              }
            }' > payload.json
        
            # Send to Ollama API
            curl -s -X POST http://localhost:11434/api/generate \
              -H "Content-Type: application/json" \
              -d @payload.json > response.json
        
            # Extract the response text
            jq -r '.response' response.json > review.txt
        
            # Clean up temporary files (optional)
            rm -f prompt.txt payload.json response.json

      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            
            // Truncate if too long (GitHub comments have a 65,536 character limit)
            const maxLength = 65000;
            const finalReview = review.length > maxLength 
              ? review.substring(0, maxLength) + "\n\n... (truncated due to length)"
              : review;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 AI Code Review\n\n${finalReview}`
            });

