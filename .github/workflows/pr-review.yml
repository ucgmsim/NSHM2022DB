name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted   # Uses your hypocentre runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ github.event.pull_request.diff_url }}" > pr.diff

      - name: Run Ollama review
        id: review
        run: |
          # Build prompt with the diff
          PROMPT="You are a code reviewer. Review the following code changes. Focus on:
          - Bugs and logic errors
          - Performance issues
          - Security vulnerabilities
          - Code style and best practices
          - Missing error handling
          
          Provide specific, actionable feedback for each issue.
          
          Code diff:
          $(cat pr.diff)"
          
          # Send to Ollama API (running on localhost)
          RESPONSE=$(curl -s -X POST http://localhost:11434/api/generate \
            -d "{
              \"model\": \"qwen2.5-coder:7b\",
              \"prompt\": \"$PROMPT\",
              \"stream\": false,
              \"options\": {
                \"temperature\": 0.3,
                \"max_tokens\": 2000
              }
            }")
          
          echo "$RESPONSE" | jq -r '.response' > review.txt

      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            
            // Truncate if too long (GitHub comments have a 65,536 character limit)
            const maxLength = 65000;
            const finalReview = review.length > maxLength 
              ? review.substring(0, maxLength) + "\n\n... (truncated due to length)"
              : review;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 AI Code Review\n\n${finalReview}`
            });

