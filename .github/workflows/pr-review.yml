name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write   # required for issue comments (PRs are also issues)

jobs:
  review:
    runs-on: self-hosted   # Uses your hypocentre runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ github.event.pull_request.diff_url }}" > pr.diff

      - name: Run DeepSeek review
        id: review
        run: |
          sudo apt-get update && sudo apt-get install -y jq

          # Filter to only code files
          cat pr.diff | \
            grep -E '^diff --git a/.*\.(py|js|ts|go|rs|java|cpp|h|sh|rb|php|html|css|sql)$' > pr.diff.filtered
          
          if [ ! -s pr.diff.filtered ]; then
            echo "✅ No code changes to review" > review.txt
            exit 0
          fi

          cat > prompt.txt << 'EOF'
          You are a senior code reviewer. Review the following code changes.

          CRITICAL RULES:
          1. DO NOT summarize what the code does.
          2. ONLY point out SPECIFIC problems.
          3. For each problem, provide:
             - The EXACT file name
             - The EXACT problematic code line
             - WHY it's a problem
             - HOW to fix it
          4. Focus on: bugs, security flaws, performance issues, bad practices.
          5. If you find no issues, output: "✅ No issues found."

          FORMAT (MUST FOLLOW EXACTLY):
          ### FILE: filename.py
          - CODE: [the exact problematic line]
          - PROBLEM: [what's wrong]
          - FIX: [how to fix]

          Code diff to review:
          EOF

          cat pr.diff.filtered >> prompt.txt

          cat > payload.json << JSONEOF
          {
            "model": "deepseek-chat",
            "messages": [
              {"role": "system", "content": "You are a harsh code reviewer. Only output issues in the exact format specified."},
              {"role": "user", "content": $(jq -Rs . < prompt.txt)}
            ],
            "temperature": 0.1,
            "max_tokens": 4000
          }
          JSONEOF

          curl -s -X POST https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEEPSEEK_API_KEY }}" \
            -d @payload.json > response.json

          jq -r '.choices[0].message.content' response.json > review.txt

          rm -f prompt.txt payload.json response.json pr.diff.filtered

      - name: Post structured review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            
            // Format as markdown with better structure
            const formattedReview = review
              .replace(/### FILE:/g, '---\n### 📁 FILE:')
              .replace(/- CODE:/g, '**💻 Code:**')
              .replace(/- PROBLEM:/g, '**⚠️ Problem:**')
              .replace(/- FIX:/g, '**✅ Fix:**')
              .replace(/---/g, '\n---\n');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 DeepSeek Code Review\n\n${formattedReview}`
            });

