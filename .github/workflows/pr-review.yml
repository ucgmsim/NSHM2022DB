name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ github.event.pull_request.diff_url }}" > pr.diff

      - name: Debug - Check diff content
        run: |
          echo "📏 Full diff size: $(wc -c < pr.diff) bytes"
          echo "📝 First 500 characters of diff:"
          head -c 500 pr.diff
          echo ""
          echo "📊 Files in diff:"
          grep '^diff --git' pr.diff || echo "No diff entries found"

      - name: Run DeepSeek review
        id: review
        run: |
          sudo apt-get update && sudo apt-get install -y jq

          # If diff is empty, exit early
          if [ ! -s pr.diff ]; then
            echo "✅ PR diff is empty. Nothing to review." > review.txt
            exit 0
          fi

          # Use the FULL diff - don't filter it
          # The AI should handle identifying code vs non-code files
          cat pr.diff > pr.diff.full

          cat > prompt.txt << 'EOF'
          You are a senior code reviewer. Review the following code diff.

          CRITICAL RULES:
          1. DO NOT summarize what the code does.
          2. ONLY point out SPECIFIC problems in the code changes.
          3. For each problem, provide:
             - The EXACT file name
             - The EXACT line number (if available from the diff) – look for the line number in the diff metadata (e.g., @@ -1,5 +1,6 @@) and use it.
             - The EXACT problematic code line (copy the code)
             - WHY it's a problem
             - HOW to fix it
          4. Focus on: bugs, security flaws, performance issues, bad practices.
          5. If you find no issues, output: "✅ No issues found. The code looks good."

          FORMAT (MUST FOLLOW EXACTLY):
          ### FILE: filename.py
          - LINE: 42
          - CODE: [the exact problematic line]
          - PROBLEM: [what's wrong]
          - FIX: [how to fix]

          ### FILE: another.py
          - CODE: [the exact problematic line]
          - PROBLEM: [what's wrong]
          - FIX: [how to fix]

          Code diff to review:
          EOF

          cat pr.diff.full >> prompt.txt

          # Create JSON payload for DeepSeek API
          cat > payload.json << JSONEOF
          {
            "model": "deepseek-chat",
            "messages": [
              {"role": "system", "content": "You are a harsh code reviewer. Only output issues in the exact format specified. If the diff is empty or only contains binary files, output exactly: '✅ No code changes to review.'"},
              {"role": "user", "content": $(jq -Rs . < prompt.txt)}
            ],
            "temperature": 0.1,
            "max_tokens": 4000
          }
          JSONEOF

          # Call DeepSeek API
          curl -s -X POST https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEEPSEEK_API_KEY }}" \
            -d @payload.json > response.json

          # Extract the response
          jq -r '.choices[0].message.content' response.json > review.txt

          # Clean up
          rm -f prompt.txt payload.json response.json pr.diff.full


      - name: Post inline review comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            
            if (!review || review.trim() === '') {
              console.log('⚠️ Review is empty, skipping.');
              return;
            }
            
            // --- Parse the review to extract issues ---
            function parseReview(text) {
              const issues = [];
              const blocks = text.split(/### FILE:/);
              for (const block of blocks) {
                if (!block.trim()) continue;
                const lines = block.split('\n');
                const fileLine = lines[0].trim();
                if (!fileLine) continue;
                let filePath = fileLine.replace(/^['"]?|['"]?$/g, '').trim();
                filePath = filePath.replace(/[:\s]+$/, '');
                const content = lines.slice(1).join('\n');
                const lineMatch = content.match(/- LINE:\s*(.+?)(?=\n- CODE:|\n- PROBLEM:|\n- FIX:|$)/is);
                const codeMatch = content.match(/- CODE:\s*(.+?)(?=\n- LINE:|\n- PROBLEM:|\n- FIX:|$)/is);
                const problemMatch = content.match(/- PROBLEM:\s*(.+?)(?=\n- CODE:|\n- LINE:|\n- FIX:|$)/is);
                const fixMatch = content.match(/- FIX:\s*(.+?)(?=\n- CODE:|\n- LINE:|\n- PROBLEM:|$)/is);
                if (problemMatch && fixMatch) {
                  issues.push({
                    path: filePath,
                    line: lineMatch ? parseInt(lineMatch[1].trim()) : null,
                    code: codeMatch ? codeMatch[1].trim() : null,
                    problem: problemMatch[1].trim(),
                    fix: fixMatch[1].trim()
                  });
                }
              }
              return issues;
            }
            
            const issues = parseReview(review);
            console.log(`📊 Parsed ${issues.length} issues.`);
            if (issues.length === 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🤖 DeepSeek Code Review\n\n${review}`
              });
              return;
            }
            
            // --- Get the PR diff to validate line numbers ---
            const { data: diffData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              mediaType: { format: 'diff' }
            });
            
            // Parse diff to get changed line numbers per file
            function parseDiff(diffText) {
              const files = {};
              const lines = diffText.split('\n');
              let currentFile = '';
              for (const line of lines) {
                const match = line.match(/^diff --git a\/(.*) b\/(.*)/);
                if (match) {
                  currentFile = match[2];
                  files[currentFile] = { additions: [], deletions: [] };
                  continue;
                }
                if (!currentFile) continue;
                // Parse hunk header: @@ -a,b +c,d @@
                const hunkMatch = line.match(/^@@ -\d+(?:,\d+)? \+\d+(?:,\d+)? @@/);
                if (hunkMatch) {
                  // we could track line numbers, but for simplicity we'll just mark all lines after this as changed
                  // Actually we need to know which lines are added (+) or removed (-)
                }
                if (line.startsWith('+') && !line.startsWith('+++')) {
                  // This is an added line – we need to know its line number.
                  // We'll store it later when we parse the file content.
                }
              }
              return files;
            }
            
            // A simpler way: use GitHub's API to get the diff and parse the added line numbers using a known library.
            // But to keep it simple, we'll fetch the diff and then compute changed line numbers.
            // Since we already have the diff from the file, we can parse it in the script.
            
            // Instead of complex parsing, we can rely on the API to reject invalid line numbers,
            // and catch the error to fallback.
            
            // --- Helper: find the line number by searching the file (fallback) ---
            async function findLineNumber(path, codeSnippet) {
              try {
                const { data: fileContent } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: path,
                  ref: context.payload.pull_request.head.sha
                });
                const content = Buffer.from(fileContent.content, 'base64').toString('utf-8');
                const lines = content.split('\n');
                const searchKey = codeSnippet.substring(0, 60);
                for (let i = 0; i < lines.length; i++) {
                  if (lines[i].includes(searchKey)) {
                    return i + 1;
                  }
                }
              } catch (e) {
                console.log(`⚠️ Could not fetch ${path}: ${e.message}`);
              }
              return null;
            }
            
            // --- Post comments ---
            const reviewComments = [];
            for (const issue of issues) {
              let lineNumber = issue.line;
              // If line not provided, try to find it
              if (!lineNumber && issue.code) {
                lineNumber = await findLineNumber(issue.path, issue.code);
              }
              // If we have a valid line number, try to post inline
              if (lineNumber) {
                reviewComments.push({
                  path: issue.path,
                  line: lineNumber,
                  side: 'RIGHT',
                  body: `**⚠️ Problem:** ${issue.problem}\n\n**✅ Fix:** ${issue.fix}`
                });
              } else {
                // No line number found, fallback to issue comment
                console.log(`⚠️ No line number for ${issue.path}, posting as regular comment.`);
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `## 📁 ${issue.path}\n\n**💻 Code:** \`${issue.code || 'N/A'}\`\n\n**⚠️ Problem:** ${issue.problem}\n\n**✅ Fix:** ${issue.fix}`
                });
              }
            }
            
            // Post all inline comments as a single review
            if (reviewComments.length > 0) {
              try {
                const { data: reviewData } = await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  body: '## 🤖 AI Code Review',
                  event: 'COMMENT',
                  comments: reviewComments
                });
                console.log(`✅ Created review with ${reviewComments.length} inline comments.`);
              } catch (error) {
                console.log(`❌ Failed to create review: ${error.message}`);
                // Fallback: post each inline comment individually
                for (const comment of reviewComments) {
                  try {
                    await github.rest.pulls.createReviewComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: context.issue.number,
                      body: comment.body,
                      path: comment.path,
                      line: comment.line,
                      side: 'RIGHT'
                    });
                  } catch (e) {
                    console.log(`⚠️ Failed to post inline comment: ${e.message}`);
                    // Final fallback: issue comment
                    await github.rest.issues.createComment({
                      issue_number: context.issue.number,
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      body: `## 📁 ${comment.path}\n\n${comment.body}`
                    });
                  }
                }
              }
            }


