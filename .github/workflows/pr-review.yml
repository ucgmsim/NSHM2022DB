name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write   # required for issue comments (PRs are also issues)

jobs:
  review:
    runs-on: self-hosted   # Uses your hypocentre runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test Ollama connection
        run: |
          curl -s http://localhost:11434/api/version || exit 1
          echo "Ollama is reachable"

      - name: Get PR diff
        id: diff
        run: |
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ github.event.pull_request.diff_url }}" > pr.diff

      - name: Run Ollama review
        id: review
        run: |
          sudo apt-get update && sudo apt-get install -y jq
      
          cat > prompt.txt << 'EOF'
          You are a senior code reviewer. Review the following code changes.
      
          Your task is to:
          1. Identify specific bugs, logic errors, or edge cases
          2. Point out performance issues or inefficient code
          3. Flag security vulnerabilities
          4. Suggest improvements to code style, readability, and maintainability
          5. Check for proper error handling
          6. Identify any missing documentation or unclear code
      
          For each issue you find:
          - Show the exact line or block of code that's problematic
          - Explain why it's an issue
          - Provide a concrete suggestion for how to fix it
      
          DO NOT:
          - Summarize what the code does (I already know that)
          - Write generic advice (be specific to this code)
          - Praise the code without pointing out issues
      
          Format your response as:
          ### Issue 1: [Brief title]
          - **Location**: [File:line or function name]
          - **Problem**: [What's wrong]
          - **Suggestion**: [How to fix it]
      
          ### Issue 2: [Brief title]
          ...and so on.
      
          If you find no issues, output: "No issues found. The code looks good."
      
          Code diff:
          EOF
      
          cat pr.diff >> prompt.txt
      
          jq -n --rawfile prompt prompt.txt '{
            model: "deepseek-coder-v2:16b",
            prompt: $prompt,
            stream: false,
            options: {
              temperature: 0.2,
              max_tokens: 3000
            }
          }' > payload.json
      
          curl -s -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d @payload.json > response.json
      
          jq -r '.response' response.json > review.txt
      
          rm -f prompt.txt payload.json response.json

      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            
            // Truncate if too long (GitHub comments have a 65,536 character limit)
            const maxLength = 65000;
            const finalReview = review.length > maxLength 
              ? review.substring(0, maxLength) + "\n\n... (truncated due to length)"
              : review;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 AI Code Review\n\n${finalReview}`
            });


